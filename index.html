<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>大田区 今日/明日の天気（詳細版）</title>
<style>
  /* 全体のカラーテーマと背景（グラスモーフィズムが映えるように背景をグラデーションに） */
  :root {
    color-scheme: dark light;
    --bg-grad: linear-gradient(135deg, #141e30 0%, #243b55 100%);
    --fg: #eee;
    --glass-bg: rgba(20, 20, 20, 0.4);
    --glass-bd: rgba(255, 255, 255, 0.1);
    --mut: #aaa;
    --acc: #4caf50;
  }
  
  body {
    font-family: system-ui, "Noto Sans JP", sans-serif;
    background: var(--bg-grad);
    background-attachment: fixed;
    color: var(--fg);
    margin: 14px;
    line-height: 1.6;
  }

  /* グラスモーフィズム対応のカードデザイン */
  .card {
    background: var(--glass-bg);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--glass-bd);
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    margin-bottom: 12px;
  }

  h1 { margin: 0 0 6px; font-size: 18px; }
  
  /* タブのスタイル */
  .tabs { display: flex; gap: 8px; margin-bottom: 8px; }
  .tab {
    flex: 1; text-align: center; padding: 10px; border-radius: 10px;
    border: 1px solid var(--glass-bd); background: rgba(0,0,0,0.3);
    color: #ddd; cursor: pointer; transition: all 0.2s ease;
  }
  .tab.active { background: var(--acc); color: #fff; border-color: transparent; font-weight: 700; }
  
  /* 現在の天気エリア */
  .now { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .big { font-size: 44px; font-weight: 700; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
  .meta { font-size: 13px; color: var(--mut); }
  .topline { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; }
  .hiLo { font-size: 14px; font-weight: bold; }
  .hide { display: none; }

  /* 1時間ごとのリスト表示エリア */
  .row {
    display: flex; justify-content: space-between; gap: 8px; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--glass-bd);
    opacity: 0; animation: fadeIn 0.4s ease forwards; /* ふわっと表示 */
  }
  .row:last-child { border-bottom: none; }
  
  /* リスト内の各要素の幅調整 */
  .hour { width: 44px; text-align: right; font-variant-numeric: tabular-nums; color: #ccc; }
  .icon { width: 28px; text-align: center; font-size: 18px; }
  .temp { width: 44px; text-align: right; font-weight: bold; font-variant-numeric: tabular-nums; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
  .barwrap { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.05); border-radius: 10px; height: 16px; overflow: hidden; box-shadow: inset 0 1px 3px rgba(0,0,0,0.5); }
  .bar { height: 100%; background: linear-gradient(90deg, #3fa9f5, #1976d2); transition: width 0.5s ease; }
  .pct { width: 44px; text-align: right; font-variant-numeric: tabular-nums; font-size: 14px; }
  
  .w { font-size: 26px; }

  /* アニメーション用キーフレーム */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="topline">
    <h1 id="title">東京都 大田区｜今日の天気</h1>
    <div class="meta" id="updated">更新: --</div>
  </div>

  <div class="tabs">
    <button id="tabToday" class="tab active" type="button">今日</button>
    <button id="tabTomorrow" class="tab" type="button">明日</button>
  </div>

  <div class="now" id="nowBlock">
    <div>
      <div id="desc" class="meta">—</div>
      <div id="hiLo" class="hiLo">最高 —°C / 最低 —°C</div>
      <div class="meta">35.561, 139.716</div>
    </div>
    <div class="big"><span id="temp">--</span>°C <span class="w" id="icon">—</span></div>
  </div>

  <div id="hiLoOnly" class="hiLo hide">最高 —°C / 最低 —°C</div>
</div>

<div class="card">
  <h1 id="listTitle">降水確率と気温（現在時刻から）</h1>
  <div id="list"></div>
  <div class="meta" style="margin-top:8px">単位: % / °C（Open-Meteo / Asia/Tokyo）</div>
</div>

<div class="card" id="err" style="display:none; color:#ff7777; font-weight:bold;"></div>

<script>
(()=>{
  // 固定座標：東京都大田区
  const LAT = 35.561, LON = 139.716, TZ = "Asia/Tokyo";
  const $ = id => document.getElementById(id);

  // 要素
  const titleEl = $("title"), updatedEl = $("updated");
  const tabToday = $("tabToday"), tabTomorrow = $("tabTomorrow");
  const nowBlock = $("nowBlock"), hiLoOnly = $("hiLoOnly");
  const tempEl = $("temp"), iconEl = $("icon"), descEl = $("desc");
  const hiLoEl = $("hiLo"), hiLoOnlyEl = $("hiLoOnly");
  const listTitle = $("listTitle"), listEl = $("list");
  const errEl = $("err");

  // 状態
  let data = null;
  let selectedDay = 0; // 0=今日, 1=明日

  // weathercode → emoji/日本語
  const WMAP = {
    0:["☀️","快晴"], 1:["🌤","晴れ"], 2:["⛅","薄曇り"], 3:["☁️","くもり"],
    45:["🌫","霧"], 48:["🌫","霧"],
    51:["🌦","弱い霧雨"], 53:["🌦","霧雨"], 55:["🌦","強い霧雨"],
    56:["🌧","着氷性霧雨"], 57:["🌧","強い着氷性霧雨"],
    61:["🌧","弱い雨"], 63:["🌧","雨"], 65:["🌧","強い雨"],
    66:["🌧","着氷性雨"], 67:["🌧","強い着氷性雨"],
    71:["🌨","弱い雪"], 73:["🌨","雪"], 75:["🌨","大雪"],
    77:["🌨","雪あられ"], 80:["🌦","にわか雨(弱)"], 81:["🌦","にわか雨"], 82:["⛈","にわか雨(強)"],
    85:["🌨","にわか雪(弱)"], 86:["🌨","にわか雪(強)"],
    95:["⛈","雷雨"], 96:["⛈","雷雨(雹)"], 99:["⛈","激しい雷雨(雹)"]
  };

  function showErr(msg){ errEl.style.display="block"; errEl.textContent = msg; }
  function clearErr(){ errEl.style.display="none"; errEl.textContent=""; }
  function pad2(n){ return String(n).padStart(2, "0"); }
  function dayRange(offset=0){
    const base = new Date(); base.setDate(base.getDate()+offset);
    const start = new Date(base.getFullYear(), base.getMonth(), base.getDate(), 0,0,0);
    const end   = new Date(base.getFullYear(), base.getMonth(), base.getDate(), 23,59,59,999);
    return [start, end];
  }
  function fmtHour(iso){ const d = new Date(iso); return pad2(d.getHours()) + ":00"; }

  // 気温に合わせて色を計算する関数（青〜緑〜黄〜赤）
  function getTempColor(temp) {
    let hue = 240 - (temp * 7); // 0度=240(青), 15度=135(緑), 30度=30(オレンジ)
    if (hue < 0) hue = 0;
    if (hue > 280) hue = 280;
    return `hsl(${hue}, 80%, 70%)`;
  }

  async function fetchData(){
    clearErr();
    const url = new URL("https://api.open-meteo.com/v1/forecast");
    const params = {
      latitude: LAT, longitude: LON, timezone: TZ,
      current_weather: "true",
      // ★ hourly に temperature_2m と weathercode を追加しました
      hourly: "precipitation_probability,temperature_2m,weathercode",
      daily: "weathercode,temperature_2m_max,temperature_2m_min"
    };
    url.search = new URLSearchParams(params).toString();
    const r = await fetch(url);
    if(!r.ok) throw new Error("天気データの取得に失敗しました");
    return await r.json();
  }

  function renderHeader(){
    if(selectedDay === 0){
      titleEl.textContent = "東京都 大田区｜今日の天気";
      listTitle.textContent = "天気と降水確率（現在時刻から）";
      nowBlock.classList.remove("hide");
      hiLoOnly.classList.add("hide");

      const cw = data.current_weather;
      const [ic, tx] = (WMAP[cw.weathercode] || ["❓","不明"]);
      tempEl.textContent = Math.round(cw.temperature);
      iconEl.textContent = ic;
      descEl.textContent = `現在：${tx}／風 ${Math.round(cw.windspeed)} m/s`;
      updatedEl.textContent = `更新: ${new Date(cw.time).toLocaleString("ja-JP", {hour:'2-digit', minute:'2-digit'})}`;

      const tmax = Math.round(data.daily.temperature_2m_max[0]);
      const tmin = Math.round(data.daily.temperature_2m_min[0]);
      hiLoEl.textContent = `最高 ${tmax}°C / 最低 ${tmin}°C`;
      hiLoEl.style.color = getTempColor(tmax); // 最高気温に色をつけるおまけ
    }else{
      titleEl.textContent = "東京都 大田区｜明日の天気";
      listTitle.textContent = "天気と降水確率（明日 0–23時）";
      nowBlock.classList.add("hide");
      hiLoOnly.classList.remove("hide");

      const tmax = Math.round(data.daily.temperature_2m_max[1]);
      const tmin = Math.round(data.daily.temperature_2m_min[1]);
      hiLoOnlyEl.textContent = `最高 ${tmax}°C / 最低 ${tmin}°C`;
      hiLoOnlyEl.style.color = getTempColor(tmax);
    }
  }

  function renderList(){
    listEl.innerHTML = "";
    const [start, end] = dayRange(selectedDay);
    const times = data.hourly.time;
    const pops  = data.hourly.precipitation_probability;
    const temps = data.hourly.temperature_2m; // 追加：気温
    const codes = data.hourly.weathercode;    // 追加：天気コード

    const now = new Date();
    const nowHour = now.getHours();
    let delay = 0; // アニメーションの遅延用

    for(let i=0;i<times.length;i++){
      const t = new Date(times[i]);
      if(t < start || t > end) continue;

      if(selectedDay === 0 && t.getHours() < nowHour) continue;

      const v = (pops[i] ?? 0);
      const tempVal = temps[i];
      const [ic, _] = WMAP[codes[i]] || ["❓","不明"];
      const tColor = getTempColor(tempVal);
      
      const row = document.createElement("div");
      row.className = "row";
      row.style.animationDelay = `${delay}ms`; // 順番に表示されるアニメーション
      delay += 30;

      // ★ アイコンと気温を追加してリッチに
      row.innerHTML = `
        <div class="hour">${fmtHour(times[i])}</div>
        <div class="icon">${ic}</div>
        <div class="temp" style="color:${tColor}">${Math.round(tempVal)}°</div>
        <div class="barwrap"><div class="bar" style="width:${v}%;"></div></div>
        <div class="pct">${v}%</div>
      `;
      listEl.appendChild(row);
    }
  }

  function setTab(day){
    selectedDay = day;
    tabToday.classList.toggle("active", day===0);
    tabTomorrow.classList.toggle("active", day===1);
    renderHeader();
    renderList();
  }

  // 起動
  (async ()=>{
    try{
      // 起動時は「データ取得中」の表示を出すと親切です
      listTitle.textContent = "データ取得中...";
      data = await fetchData();
      setTab(0);
    }catch(e){
      showErr(e.message || "取得に失敗しました。通信状況を確認してニャ。");
      listTitle.textContent = "エラーが発生しました";
    }
  })();

  // イベント
  tabToday.addEventListener("click", ()=> setTab(0));
  tabTomorrow.addEventListener("click", ()=> setTab(1));
})();
</script>
</body>
</html>
